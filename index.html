<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSS Sandbox & Encoder — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🎭</span>
                <div class="title-col">
                    <h1>XSS Sandbox & Encoder</h1>
                    <p class="tagline">Check and encode target elements to secure HTML and JS context strings.</p>
                </div>
            </div>
            <div class="badge">security</div>
        </header>

        <main class="workspace-card">
            
            <div class="input-group">
                <label>Input Script/HTML</label>
                <textarea id="xss-inp" placeholder="<script>alert('hacked')</script>"></textarea>
            </div>
            <div style="display: flex; gap: 12px; margin: 16px 0;">
                <button class="btn" onclick="escapeHTML()">Escape HTML context</button>
                <button class="btn btn-secondary" onclick="escapeJS()">Escape JS context</button>
            </div>
            <div class="input-group">
                <label>Secured Encoded Output</label>
                <textarea id="xss-out" readonly></textarea>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
